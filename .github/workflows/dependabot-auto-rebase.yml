name: "Dependabot: Auto-rebase"

# When main moves, check open Dependabot PRs for merge conflicts.
# Posts `@dependabot rebase` if the PR is dirty and the last comment
# isn't already a rebase request (prevents duplicate comments).
on:
  push:
    branches:
      - main

jobs:
  auto-rebase:
    name: Rebase conflicting Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Find and rebase conflicting Dependabot PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const dependabotPRs = pulls.filter(
              (pr) => pr.user.login === 'dependabot[bot]',
            );

            for (const pr of dependabotPRs) {
              // Fetch full PR details to get mergeable_state
              const { data: details } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              if (details.mergeable_state !== 'dirty') continue;

              // Check if latest comment is already a rebase request
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 1,
                direction: 'desc',
              });

              const lastComment = comments[0];
              if (lastComment && lastComment.body.trim() === '@dependabot rebase') {
                core.info(`PR #${pr.number}: already has pending rebase comment, skipping`);
                continue;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '@dependabot rebase',
              });

              core.info(`PR #${pr.number}: posted @dependabot rebase`);
            }
